<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - EcoRide</title>

    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<header>
    <nav>

        <h1>EcoRide</h1>

        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="covoiturages.html">Covoiturages</a></li>
            <li><a href="connexion.html">Connexion</a></li>
            <li><a href="inscription.html">Inscription</a></li>
        </ul>

    </nav>
</header>

<main class="auth-page">

    <section class="auth-card">

        <h2>Créer un compte</h2>

        <form>

            <label for="pseudo">Pseudo</label>
            <input type="text" id="pseudo" placeholder="Votre pseudo">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Votre email">

            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="Votre mot de passe">

            <label for="confirm-password">Confirmer le mot de passe</label>
            <input type="password" id="confirm-password" placeholder="Confirmer votre mot de passe">

            <button type="submit">Créer mon compte</button>

        </form>

        <p>Déjà inscrit ? <a href="connexion.html">Se connecter</a></p>

    </section>

</main>

</body>
</html>
